<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electronics Skill Tree — Gavin</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--border:#e2e0d8;--text:#1a1917;--muted:#8a8880;
  --scope:#1655A2;--scope-bg:#EAF1FB;
  --wfgen:#0A6B4F;--wfgen-bg:#E3F5EE;
  --mm:#7A4500;--mm-bg:#FBF0DC;
  --psu:#4A40B0;--psu-bg:#EEEDFE;
  --synth:#8C2B4E;--synth-bg:#FCE8F1;
  --pi:#1B6B30;--pi-bg:#E8F5E9;
  --lcr:#5A6B00;--lcr-bg:#F2F5DC;
  --fcnt:#00617A;--fcnt-bg:#DCF2F8;
  --anchor:#C07800;--anchor-bg:#FFF8E8;
  --gap:#A32D2D;--gap-bg:#FCE8E8;
}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* TAB BAR */
#tabs{display:flex;background:var(--surface);border-bottom:2px solid var(--border);flex-shrink:0}
.tab{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;padding:8px 18px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;letter-spacing:.04em;transition:color .15s,border-color .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--text)}

/* TREE VIEW */
#tree-view{display:flex;flex-direction:column;flex:1;overflow:hidden}
#toolbar{display:flex;gap:4px;padding:6px 12px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;flex-shrink:0}
.fb{font-family:'IBM Plex Mono',monospace;font-size:9.5px;padding:2px 8px;border-radius:3px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;letter-spacing:.04em;transition:all .12s}
.fb:hover{color:var(--text);border-color:#aaa}
.fb.on{background:var(--text);color:#fff;border-color:transparent}
.leg{display:flex;align-items:center;gap:3px;font-size:9px;color:var(--muted);margin-left:3px;font-family:'IBM Plex Mono',monospace}
.ls{width:10px;height:10px;border-radius:2px}
#main{display:flex;flex:1;overflow:hidden}
#cw{flex:1;overflow:auto;padding:12px 12px 12px 20px}
svg#tree{display:block}
#panel{width:0;border-left:1px solid var(--border);overflow:hidden;transition:width .2s;flex-shrink:0;background:var(--surface)}
#panel.open{width:280px;overflow-y:auto}
#pi{padding:14px;min-width:280px;position:relative}
h3{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;margin-bottom:3px;padding-right:18px;letter-spacing:.02em}
.badge{font-family:'IBM Plex Mono',monospace;font-size:8.5px;padding:2px 5px;border-radius:2px;background:#f0ede6;color:#666;display:inline-block;margin-bottom:5px;letter-spacing:.05em}
.cost{font-size:11px;color:var(--muted);margin-bottom:5px;display:block;font-family:'IBM Plex Mono',monospace}
.desc{font-size:11px;color:#555;line-height:1.6;margin-bottom:7px}
.sh{font-family:'IBM Plex Mono',monospace;font-size:8.5px;font-weight:600;letter-spacing:.1em;color:#bbb;margin:8px 0 3px;text-transform:uppercase}
.tc{font-size:9.5px;padding:2px 6px;border-radius:3px;margin:2px 2px 0 0;display:inline-block;background:#e8f0fb;color:#185FA5;font-family:'IBM Plex Mono',monospace}
.pc{font-size:9.5px;padding:2px 6px;border-radius:3px;margin:2px 2px 0 0;display:inline-block;cursor:pointer;border:1px solid var(--border);background:#faf9f7;color:#555;font-family:'IBM Plex Mono',monospace;transition:background .1s}
.pc:hover{background:#f0ede6}
.cm{font-size:10px;color:#666;padding:2px 0;border-bottom:1px solid #f0ede6;font-family:'IBM Plex Mono',monospace}
.cm:last-child{border:none}
.gc{font-size:9.5px;padding:2px 6px;border-radius:3px;margin:2px 2px 0 0;display:inline-block;background:var(--gap-bg);color:var(--gap);border:1px solid #f7c1c1;font-family:'IBM Plex Mono',monospace}
#cx{position:absolute;top:12px;right:12px;cursor:pointer;font-size:14px;color:#bbb;font-family:'IBM Plex Mono',monospace}
#cx:hover{color:var(--text)}
.an{font-size:9.5px;padding:3px 7px;border-radius:3px;background:var(--anchor-bg);color:var(--anchor);margin-bottom:6px;display:inline-block;border:1px solid #f0d080;font-family:'IBM Plex Mono',monospace}
.gn{font-size:9.5px;padding:3px 7px;border-radius:3px;background:var(--gap-bg);color:var(--gap);margin-bottom:6px;display:inline-block;border:1px solid #f7c1c1;font-family:'IBM Plex Mono',monospace}
.nd{cursor:pointer}
.nd:hover rect{opacity:.82}

/* ROADMAP VIEW */
#roadmap-view{flex:1;overflow:auto;padding:24px 32px;display:none}
.rm-header{margin-bottom:28px}
.rm-header h2{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:600;letter-spacing:.03em;margin-bottom:4px}
.rm-header p{font-size:12px;color:var(--muted);max-width:600px;line-height:1.6}
.rm-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:1100px}
.rm-phase{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:18px}
.rm-phase-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.rm-phase-num{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;letter-spacing:.12em;color:var(--muted);background:#f0ede6;padding:2px 7px;border-radius:2px}
.rm-phase-title{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600}
.rm-phase-sub{font-size:10px;color:var(--muted);margin-bottom:12px;line-height:1.5}
.rm-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #f0ede6}
.rm-item:last-child{border:none}
.rm-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
.rm-dot.now{background:#2E7D32;box-shadow:0 0 0 2px #a5d6a7}
.rm-dot.next{background:var(--anchor);box-shadow:0 0 0 2px #f9d89a}
.rm-dot.soon{background:#4A90D9;box-shadow:0 0 0 2px #b3d4f5}
.rm-dot.later{background:#bbb;box-shadow:0 0 0 2px #e0e0e0}
.rm-item-body{}
.rm-item-label{font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:500;margin-bottom:2px}
.rm-item-desc{font-size:10px;color:#666;line-height:1.5}
.rm-tag{font-family:'IBM Plex Mono',monospace;font-size:8.5px;padding:1px 5px;border-radius:2px;margin-right:3px;margin-top:3px;display:inline-block}
.rm-legend{display:flex;gap:16px;margin-top:20px;margin-bottom:28px;flex-wrap:wrap}
.rm-legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace}
.rm-blocker{font-size:9.5px;color:var(--gap);background:var(--gap-bg);padding:1px 5px;border-radius:2px;font-family:'IBM Plex Mono',monospace;margin-top:3px;display:inline-block}
.rm-win{font-size:9.5px;color:#0A6B4F;background:#E3F5EE;padding:1px 5px;border-radius:2px;font-family:'IBM Plex Mono',monospace;margin-top:3px;display:inline-block}
.complete-btn{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;letter-spacing:.07em;padding:5px 10px;border-radius:3px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;margin-top:12px;display:block;width:100%;transition:all .15s;text-transform:uppercase}
.complete-btn:hover{border-color:#0A6B4F;color:#0A6B4F}
.complete-btn.done{background:var(--wfgen-bg);color:var(--wfgen);border-color:#7ecfb2}
</style>
</head>
<body>
<div id="tabs">
  <div class="tab active" onclick="switchTab('tree',this)">SKILL TREE</div>
  <div class="tab" onclick="switchTab('roadmap',this)">ROADMAP</div>
</div>
