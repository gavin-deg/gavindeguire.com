<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f7f4;color:#1a1a18;font-size:13px}
#app{display:flex;flex-direction:column;height:100vh}
#toolbar{display:flex;gap:5px;padding:7px 12px;background:#fff;border-bottom:1px solid #e5e3dc;flex-wrap:wrap;align-items:center;flex-shrink:0}
.fb{font-size:10px;padding:2px 8px;border-radius:8px;border:1px solid #d5d3cc;background:#fff;color:#555;cursor:pointer}
.fb.on{background:#1a5276;color:#fff;border-color:transparent}
.leg{display:flex;align-items:center;gap:3px;font-size:10px;color:#777;margin-left:4px}
.ls{width:11px;height:11px;border-radius:2px}
#main{display:flex;flex:1;overflow:hidden}
#cw{flex:1;overflow:auto;padding:12px}
svg#tree{display:block}
#panel{width:0;border-left:1px solid #e5e3dc;overflow:hidden;transition:width .2s;flex-shrink:0;background:#fff}

#pi{padding:12px;min-width:272px;position:relative}
h3{font-size:12px;font-weight:600;margin-bottom:2px;padding-right:16px}
.badge{font-size:9px;padding:2px 6px;border-radius:7px;background:#f0ede6;color:#666;display:inline-block;margin-bottom:5px}
.cost{font-size:11px;color:#888;margin-bottom:5px;display:block}
.desc{font-size:11px;color:#555;line-height:1.55;margin-bottom:7px}
.sh{font-size:9px;font-weight:600;letter-spacing:.07em;color:#aaa;margin:7px 0 3px;text-transform:uppercase}
.tc{font-size:10px;padding:2px 6px;border-radius:7px;margin:2px 2px 0 0;display:inline-block;background:#e8f0fb;color:#185FA5}
.pc{font-size:10px;padding:2px 6px;border-radius:7px;margin:2px 2px 0 0;display:inline-block;cursor:pointer;border:1px solid #e5e3dc;background:#faf9f7;color:#555}
.pc:hover{background:#f0ede6}
.cm{font-size:10px;color:#666;padding:2px 0;border-bottom:1px solid #f0ede6}
.cm:last-child{border:none}
.gc{font-size:10px;padding:2px 6px;border-radius:7px;margin:2px 2px 0 0;display:inline-block;background:#fce8e8;color:#a32d2d;border:1px solid #f7c1c1}
#cx{position:absolute;top:12px;right:12px;cursor:pointer;font-size:13px;color:#aaa}
#cx:hover{color:#333}
.an{font-size:10px;padding:3px 7px;border-radius:5px;background:#fef3e2;color:#92470a;margin-bottom:6px;display:inline-block;border:1px solid #f9d89a}
.gn{font-size:10px;padding:3px 7px;border-radius:5px;background:#fce8e8;color:#a32d2d;margin-bottom:6px;display:inline-block;border:1px solid #f7c1c1}
.nd{cursor:pointer}
.nd:hover rect{opacity:.82}
</style>

var nodes=[
  {id:'s0',cat:'scope',tier:0,label:'Serial plotter',sub:'Uno+MCP3202 raw',cost:'$0 marginal',desc:'MCP3202 SPI to Uno, samples to PC serial plotter. No display, no trigger. Proves ADC wiring only.',techs:['SPI protocol','ADC sampling basics','Serial debug'],pre:[],cmp:[]},
  {id:'s1',cat:'scope',tier:1,label:'Pico audio scope',sub:'Dual-core + ST7789V',cost:'~$10 total',desc:'Pico core 0 samples exclusively, core 1 drives ST7789V. 80-100ksps, 40kHz usable BW, 12-bit resolution. Level trigger with pre-trigger buffer. Full audio band.',techs:['Dual-core task split','TFT_eSPI driver','Pre-trigger buffer','Level trigger'],pre:['s0'],cmp:['DSO138 ~$18 - you match BW, beat on 12-bit vs 8-bit res']},
  {id:'s2',cat:'scope',tier:2,label:'Input protection',sub:'Divider+clamp+AC/DC',cost:'+~$1',desc:'Resistor divider with 2.5V bias for bipolar signals. 1N4148 clamping. AC/DC coupling switch. Multiple voltage ranges. Safe to probe real circuits. All components in hand.',techs:['Voltage divider design','Clamping diodes','AC coupling','Bipolar input bias'],pre:['s1'],cmp:[]},
  {id:'s3',cat:'scope',tier:3,label:'Buffered front end',sub:'Fast op-amp + BNC',cost:'+~$8',gap:true,gapItems:['OPA2134 or AD8065 op-amp (~$4 Mouser)','BNC jack (~$2 AliExpress)'],desc:'OPA2134 or AD8065 unity-gain input buffer. >1MOhm impedance. Precision attenuator. BNC jack. 8MHz -3dB analog BW. Front end no longer the bottleneck.',techs:['Op-amp input buffer','Impedance matching','BNC termination','Attenuator design'],pre:['s2'],cmp:['Fnirsi DPOX180H ~$55 - comparable BW, inferior res']},
  {id:'sA',cat:'anchor',tier:3.55,label:'Rigol DS1052E',sub:'Bootstrap anchor - buy once',cost:'~$70-90 used eBay',anchor:true,desc:'The one justified buy. 50MHz unlockable to 100MHz. Dual channel essential for VCO calibration and filter debug. Kept permanently as calibration reference even after DIY scope surpasses it. Use eBay credit here.',techs:[],pre:[],cmp:['Validates all downstream DIY builds - never deprecated']},
  {id:'s4',cat:'scope',tier:4,label:'PIO parallel ADC',sub:'AD9280 32Msps + PIO',cost:'~$30 total',gap:true,gapItems:['AD9280 8-bit 32Msps ADC (~$5 AliExpress)'],desc:'AD9280 8-bit 32Msps parallel CMOS ADC. Pico PIO reads 8 data lines into DMA ring buffer. LM393 hardware comparator trigger (in transit). 5-15Msps effective, 1-5MHz usable BW.',techs:['PIO state machine','Parallel ADC interface','DMA ring buffer','Hardware comparator trigger'],pre:['s3'],cmp:['DSO138 kit ~$18 (same architecture)','Hantek 6022BE ~$65']},
  {id:'s5',cat:'scope',tier:5,label:'Scope PCB v1',sub:'KiCad 2-layer + GND plane',cost:'~$40 total',desc:'Tier 4 on fabricated PCB. Ground plane. Decoupling at every power pin. 10-20Msps on PCB vs 5Msps on breadboard. Trigger hysteresis.',techs:['KiCad PCB layout','Ground plane strategy','Decoupling placement'],pre:['s4','p2'],cmp:['Hantek 6022BE ~$65']},
  {id:'s6',cat:'scope',tier:6,label:'FPGA acquisition',sub:'AD9288 100Msps + iCE40',cost:'~$90-120 total',gap:true,gapItems:['AD9288 dual 100Msps ADC (~$12 Mouser)','iCE40 FPGA board (~$25)'],desc:'AD9288 dual 8-bit 100Msps dedicated scope ADC. iCE40 FPGA captures into block RAM. Sub-ns trigger. 50-200Msps, 10-70MHz usable BW.',techs:['FPGA HDL Verilog','High-speed PCB','Block RAM management','Digital trigger design'],pre:['s5'],cmp:['Rigol DS1054Z ~$250 used','Hantek 6254BC ~$120']},
  {id:'pi0',cat:'pi3',tier:1,label:'Pi 3 scope display',sub:'Pico acq + Pi3 HDMI out',cost:'$0 (Pi3 found)',desc:'Pico handles hard real-time ADC sampling over USB serial. Pi 3 runs Python to receive sample buffers and render waveform to HDMI monitor. Much larger display than ST7789V. Same BW - Pi3 only handles display.',techs:['HDMI display output','USB serial data pipe','Python waveform rendering'],pre:['s1'],cmp:[]},
  {id:'pi1',cat:'pi3',tier:2,label:'FFT spectrum analyzer',sub:'NumPy FFT on Pi 3',cost:'$0 marginal',desc:'Pi 3 runs NumPy FFT on incoming Pico sample buffers. Real-time spectrum display on HDMI. 40kHz max (MCP3202 limited) but excellent frequency resolution at audio frequencies. Invaluable for synth harmonic analysis.',techs:['FFT via NumPy','Windowing functions Hann/Blackman','Spectrum display','Audio harmonic analysis'],pre:['pi0'],cmp:[]},
  {id:'pi2',cat:'pi3',tier:3,label:'Web scope interface',sub:'Flask + browser display',cost:'$0 marginal',desc:'Pi 3 serves a Flask web app. Scope display, FFT, and controls accessible from any browser on the network. Waveform data streamed via WebSocket. No dedicated screen needed.',techs:['Flask web server','WebSocket streaming','Browser canvas rendering'],pre:['pi1'],cmp:[]},
  {id:'pi3n',cat:'pi3',tier:4,label:'USB audio ADC scope',sub:'24-bit 96kHz via Pi 3',cost:'~$15 (USB audio IF)',gap:true,gapItems:['USB audio interface (~$15 Amazon - Behringer UCA202 or similar)'],desc:'USB audio interface gives 24-bit 96kHz ADC on Pi 3. 48kHz Nyquist, far better resolution than MCP3202 for audio work. Python reads audio stream directly. Purpose-built for audio-band synth measurement.',techs:['PyAudio / sounddevice','24-bit audio ADC interface','Audio frequency calibration'],pre:['pi2'],cmp:['24-bit audio precision at audio frequencies - legitimate lab-grade for synth work']},
  {id:'pi4',cat:'pi3',tier:5,label:'Pi 3 WF gen UI',sub:'Full GUI for AD9833/AD9850',cost:'$0 marginal',desc:'Pi 3 runs GUI (Tkinter or Flask) controlling AD9833/AD9850 via Pico acting as SPI bridge. Store arbitrary waveforms, set sweep parameters, save/load presets. Full instrument GUI without a small dedicated display.',techs:['GUI framework Tkinter or Flask','SPI bridge via Pico','Waveform preset storage'],pre:['pi2','w4'],cmp:[]},
  {id:'w0',cat:'wfgen',tier:0,label:'Raw AD9833',sub:'Uno SPI, no conditioning',cost:'$0 marginal',desc:'AD9833 DDS + Uno. 0.6Vpp, high-Z, drifting DC offset, significant harmonics above 1MHz. Proves DDS concept only.',techs:['DDS fundamentals','Phase accumulator model','SPI control'],pre:[],cmp:[]},
  {id:'w1',cat:'wfgen',tier:1,label:'Reconstruction filter',sub:'Sallen-Key LPF + buffer',cost:'+~$1',desc:'2nd-order Sallen-Key LPF at ~1MHz (TL072 + passives, all in hand). Unity-gain buffer, ~50 Ohm output. Usable sine to 500kHz. DC offset trimmable.',techs:['Sallen-Key filter design','Pole placement','Output buffering'],pre:['w0'],cmp:['JDS6600 single ch ~$30 at audio freqs']},
  {id:'w2',cat:'wfgen',tier:2,label:'Variable amplitude',sub:'VGA pot + gain stage',cost:'+~$1',desc:'Non-inverting amp with WH148 pot, 0-3Vpp output. Requires split supply. All in hand: TL072, WH148 pots, resistors.',techs:['Variable gain amplifier','Non-inverting topology','GBW product'],pre:['w1','p1'],cmp:[]},
  {id:'w3',cat:'wfgen',tier:3,label:'DC offset control',sub:'Summing amp +/-5V',cost:'+~$1',desc:'Summing amp adds variable +/-5V DC offset. Essential for testing expo converter input range and bias-sensitive circuits. Split supply required.',techs:['Summing amplifier','DC offset injection','Split supply signal path'],pre:['w2'],cmp:['FY3200S ~$28','JDS6600 ~$35']},
  {id:'w4',cat:'wfgen',tier:4,label:'Encoder UI',sub:'Pico + KY-040 + display',cost:'~$15 total',desc:'Swap Uno for Pico. KY-040 encoder (owned) for coarse/fine frequency. ST7789V display (in transit). Push to toggle waveform. Interrupt-driven. Feels like an instrument.',techs:['Rotary encoder ISR','UI state machine','Coarse/fine tuning logic'],pre:['w3'],cmp:['FY3200S ~$28','MHS-5200A ~$32']},
  {id:'w5',cat:'wfgen',tier:5,label:'Dual ch + phase',sub:'2x AD9833, phase sync',cost:'~$18 total',desc:'Both AD9833 modules (owned) from same Pico. Phase register offset 0-360 degrees software-settable. Quadrature and phase-response testing.',techs:['SPI bus sharing','Phase register control','Quadrature generation'],pre:['w4'],cmp:['JDS6600 dual ~$45','FY6900 ~$55']},
  {id:'w6',cat:'wfgen',tier:6,label:'DAC amplitude ctrl',sub:'MCP4725 12-bit gain',cost:'+$0 owned',desc:'MCP4725 I2C DAC (already owned) replaces amplitude pot. 12-bit amplitude, ~1mV steps. AM modulation and amplitude sweep enabled.',techs:['I2C DAC control','AM modulation','Amplitude sweep'],pre:['w5'],cmp:['FY6900 ~$55','Rigol DG811 ~$150 used']},
  {id:'w7',cat:'wfgen',tier:7,label:'AD9850 DDS upgrade',sub:'32-bit word, 40MHz range',cost:'+~$4',gap:true,gapItems:['AD9850 DDS module (~$4 AliExpress)'],desc:'AD9850 replaces AD9833. 125Msps clock, 32-bit freq word, better SFDR, 0-40MHz usable sine. Filter and UI carry over.',techs:['AD9850 init sequence','Frequency word calculation','SFDR and spectral purity'],pre:['w6'],cmp:['Siglent SDG1032X ~$200 used at low freq']},
  {id:'w8',cat:'wfgen',tier:8,label:'Switched filter bank',sub:'CD4051 + 3 LPF stages',cost:'+~$3',desc:'Three 2nd-order LPF stages (100kHz, 1MHz, 10MHz). CD4051 mux (in parts list) selects filter under Pico control. Requires PCB - breadboard parasitics kill accuracy above 5MHz.',techs:['Analog mux switching','Multi-stage filter bank','Frequency-aware selection'],pre:['w7','s5'],cmp:['Siglent SDG1032X ~$200 used']},
  {id:'w9',cat:'wfgen',tier:9,label:'WF gen PCB v1',sub:'KiCad, SMD, SMA out',cost:'~$35 total',desc:'Full design on 2-layer KiCad PCB. SMD 0402/0603 passives. 50 Ohm output trace. SMA connector option. Ground plane. Clean above 5MHz.',techs:['SMD soldering 0402/0603','50 Ohm trace design','SMA connector layout'],pre:['w8'],cmp:['Siglent SDG1032X ~$200 used','Rigol DG1022Z ~$250 used']},
  {id:'m0',cat:'mm',tier:0,label:'Uno ADC voltmeter',sub:'10-bit, AVcc, 0-5V',cost:'$0',desc:'Arduino ADC, noisy AVcc reference. 0-5V, +/-2-5% accuracy. Purely to understand ADC fundamentals.',techs:['ADC ratiometric basics','Reference voltage importance'],pre:[],cmp:[]},
  {id:'m1',cat:'mm',tier:1,label:'Precision DC volt',sub:'LM4040 ref + divider',cost:'~$2',gap:true,gapItems:['LM4040 2.5V precision reference (~$1.50 AliExpress)'],desc:'LM4040 2.5V precision reference. 10:1 divider extends to 0-50V. +/-1% accuracy. First meaningful measurement.',techs:['Precision voltage reference','Divider accuracy'],pre:['m0'],cmp:[]},
  {id:'m2',cat:'mm',tier:2,label:'V + I + R',sub:'Shunt + bridge + mux',cost:'~$5 total',desc:'Resistance via voltage divider bridge. Current via 1 Ohm shunt + TL072 differential amp (both in hand). CD4051 mux for mode. 3-digit effective.',techs:['Wheatstone bridge','Differential amplifier','Shunt sizing'],pre:['m1'],cmp:[]},
  {id:'m3',cat:'mm',tier:3,label:'12-bit DVM',sub:'MCP3202 + fuse + clamps',cost:'~$8 total',desc:'MCP3202 (ordered) replaces Uno ADC. 4096 counts, 3.5 digits. 0-500V with 100:1 divider. Fuse + 1N4148 clamping (in hand). LM393 continuity beeper (in transit).',techs:['Input protection design','Fuse sizing','Continuity detection'],pre:['m2'],cmp:['Fluke 101 ~$25 - approaching on DC voltage accuracy']},
  {id:'m4',cat:'mm',tier:4,label:'True RMS AC',sub:'AD737 RMS-to-DC',cost:'~$15 total',gap:true,gapItems:['AD737 true-RMS IC (~$6 Mouser - Mouser order only)'],desc:'AD737 true-RMS-to-DC converter. Handles sine/square/triangle to 200kHz, crest factor 7:1. Exactly how commercial meters measure AC.',techs:['RMS-to-DC conversion','Crest factor handling','AC coupling for measurement'],pre:['m3'],cmp:['UNI-T UT61E ~$35 - matches on true-RMS capability']},
  {id:'m5',cat:'mm',tier:5,label:'Auto-ranging',sub:'CD4051 + Pico logic',cost:'~$18 total',desc:'CD4051 mux (in parts list) under Pico control auto-selects divider. Range hysteresis. ~10ms settling. ST7789V display with units and range indicator.',techs:['Auto-ranging algorithm','Range hysteresis','Mux settling time'],pre:['m4'],cmp:['UNI-T UT61E ~$35','Brymen BM235 ~$60']},
  {id:'m6',cat:'mm',tier:6,label:'16-bit delta-sigma',sub:'ADS1115, 4.5 digits',cost:'~$22 total',gap:true,gapItems:['ADS1115 16-bit ADC module (~$3 AliExpress)'],desc:'ADS1115 module replaces MCP3202. 16-bit, 65536 counts = 4.5 digits. Built-in PGA for hardware ranging. +/-0.05-0.1% achievable.',techs:['Delta-sigma ADC operation','PGA configuration','Noise-free bits'],pre:['m5'],cmp:['Fluke 115 ~$120 used - you match on vertical resolution']},
  {id:'m7',cat:'mm',tier:7,label:'Calibrated PCB meter',sub:'0.1% R + KiCad',cost:'~$35 total',gap:true,gapItems:['0.1% resistors specific values (~$5 Mouser)','LM4040C-2.5 low-tempco ref (~$2 Mouser)'],desc:'0.1% resistors throughout. LM4040C-2.5 low-tempco reference. Guard rings on PCB. Calibration routine in Pico flash calibrated against Rigol. +/-0.05% DC after calibration.',techs:['0.1% resistor selection','Temperature coefficient and drift','Guard ring layout','Calibration routine'],pre:['m6','sA'],cmp:['Fluke 117 ~$150 used','Keysight U1232A ~$120 used']},
  {id:'m8',cat:'mm',tier:8,label:'Full-function meter',sub:'Freq + cap + temp',cost:'~$42 total',gap:true,gapItems:['MAX31855 thermocouple IC (~$3 AliExpress)','K-type thermocouple probe (~$2)'],desc:'Frequency via LM393 squarer + Pico PIO counter (1Hz-50MHz). Capacitance via RC time constant. Temperature via MAX31855 + K-type thermocouple. Retires the DT-926.',techs:['PIO frequency counter','RC capacitance method','Thermocouple SPI interface'],pre:['m7'],cmp:['Fluke 87V ~$250 used','UNI-T UT171A ~$180']},
  {id:'p0',cat:'psu',tier:0,label:'USB / power bank',sub:'5V only, owned',cost:'Owned',desc:'Arduino Uno or USB power bank. Adequate for CMOS logic, HC14, LM386. Not suitable for op-amp circuits needing bipolar supply.',techs:['Power budget basics'],pre:[],cmp:[]},
  {id:'p1',cat:'psu',tier:1,label:'ICL7660 + MT3608',sub:'+/-9-12V, 9V bricks found',cost:'~$0 now owned',desc:'MT3608 boost + ICL7660 charge pump gives +/-9-12V split supply. The found 9V/3.5A AC-DC brick is a better input than 5V USB - use it. Gives cleaner +12V and better ICL7660 output. Sufficient for all TL072 and initial LM13700 breadboard work.',techs:['Charge pump inversion','Boost converter tuning','Split supply decoupling'],pre:['p0'],cmp:[]},
  {id:'p2',cat:'psu',tier:2,label:'LM317/337 PSU',sub:'DIY +/-15V, needs 18-24V in',cost:'~$8 + 18V brick',gap:true,gapItems:['18-24V AC-DC brick (~$8-12 Amazon) - 9V bricks too low for +/-15V output','OR center-tapped 18V transformer'],desc:'LM317T + LM337T (both in transit). Bridge rectifier, filter caps, regulators. Need ~18V+ input for +/-15V regulated out - regulators need 3V headroom. Your 9V bricks only give ~6V regulated max. Key gap: higher voltage brick.',techs:['LM317/337 design equations','Bridge rectifier sizing','Filter cap calculation','Thermal design'],pre:['p1'],cmp:[]},
  {id:'p3',cat:'psu',tier:3,label:'CC/CV PSU',sub:'Op-amp error amp loop',cost:'~$15 total',desc:'Add constant-current mode via op-amp error amplifier around pass transistor. Adjustable 0-1.5A current limit. CC/CV LED indicator. Architecture of all real bench PSUs.',techs:['CC/CV control loop','Error amplifier design','Pass transistor selection','Feedback stability'],pre:['p2'],cmp:[]},
  {id:'p4',cat:'psu',tier:4,label:'Tracked dual-rail PSU',sub:'Tracking reg + INA219',cost:'~$22 total',gap:true,gapItems:['INA219 I2C power monitor module (~$2 AliExpress)'],desc:'Negative rail tracks positive exactly. INA219 shunt monitor displays V and I live. Less than 1mV ripple, rails matched to +/-10mV. Validate tracking against Rigol. Replaces need for bought bench PSU.',techs:['Tracking regulator design','INA219 I2C power monitor','Ripple measurement'],pre:['p3','sA'],cmp:['Mastech HY3005D ~$35 - you match or exceed on tracking accuracy']},
  {id:'p5',cat:'psu',tier:5,label:'PSU PCB v1',sub:'KiCad, star grounding',cost:'~$30 total',desc:'Tier 4 on fabricated PCB. Star grounding topology. Current-sense traces sized for 2A. Panel-mount pots and binding posts. A real instrument.',techs:['Star grounding topology','Current-carrying trace sizing','Panel mount design'],pre:['p4'],cmp:[]},
  {id:'sy0',cat:'synth',tier:0,label:'HC14 drone',sub:'5-ch Schmitt + LM386',cost:'~$5 owned',desc:'74HC14 oscillators driving LM386 amps and 28mm speakers. Current build. AC coupling fix in progress. Teaches RC oscillators, DC coupling failure modes, audio amp biasing.',techs:['RC oscillator design','AC coupling fix','LM386 biasing','DC offset diagnosis'],pre:['p0'],cmp:[]},
  {id:'sy1',cat:'synth',tier:1,label:'555 VCO',sub:'CV-controlled freq',cost:'~$5',desc:'NE555 astable with CV input resistor. Not V/oct accurate but teaches V-to-F conversion directly. Audible pitch response to CV. NE555 in transit.',techs:['555 astable design','CV input scaling','V-to-F relationship'],pre:['sy0','w1'],cmp:[]},
  {id:'sy2',cat:'synth',tier:2,label:'Expo converter',sub:'Matched NPNs + 0.1% ladder',cost:'~$8',gap:true,gapItems:['0.1% resistors 10kOhm x20 (~$5 Mouser)','THAT340 matched pair (~$5 Mouser) OR hand-match 2N3904'],desc:'Matched NPN transistor pair (hand-matched 2N3904 or THAT340). 0.1% precision resistor ladder. TL072 buffer. Foundation of V/oct tracking. Ic = Is*exp(Vbe/Vt) is the governing equation.',techs:['BJT exponential I-V curve','Transistor matching technique','Precision resistor ladder','Temperature compensation'],pre:['sy1','p1','s2'],cmp:[]},
  {id:'sy3',cat:'synth',tier:3,label:'Expo VCO',sub:'Integrator + expo core',cost:'~$15 total',desc:'TL072 integrator driven by expo converter current. Triangle and square outputs. 3296W 25-turn trimmers (in transit) for V/oct calibration. Calibrate against waveform generator and Rigol simultaneously.',techs:['Integrator oscillator','Triangle and square core','V/oct calibration procedure'],pre:['sy2','w3','sA'],cmp:[]},

nodes.forEach(function(n){NM[n.id]=n;});

var crossEdges=[
  {f:'p0',t:'sy0'},{f:'p1',t:'w2'},
  {f:'p1',t:'sy2'},{f:'p1',t:'sy3'},{f:'p1',t:'sy4'},
  {f:'sA',t:'sy3'},{f:'sA',t:'sy4'},{f:'sA',t:'m7'},{f:'sA',t:'p4'},
  {f:'s2',t:'sy2'},{f:'s5',t:'w8'},
  {f:'w1',t:'sy1'},{f:'w3',t:'sy3'},
  {f:'s1',t:'pi0'},{f:'w4',t:'pi4'},
];

var aF='all',sel=null;
function ny(t){return TOP+t*TH;}
function npos(id){
  var n=NM[id];
  var cx=CX[n.cat]||CX.scope;
  if(n.anchor){cx=id==='sA'?CX.scope+NW+6:CX.psu+NW+6;}
  return {x:cx,y:ny(n.tier)};
}
function flt(f,btn){
  aF=f;
  document.querySelectorAll('.fb').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  render();
}
function closeP(){sel=null;document.getElementById('panel').classList.remove('open');render();}
function openN(id){
  sel=id;var n=NM[id];
  var h='';
  if(n.anchor)h+='<span class="an">Bootstrap anchor - buy once, keep forever</span><br>';
  if(n.gap)h+='<span class="gn">Needs order - gap component(s)</span><br>';
  h+='<h3>'+n.label+'</h3><span class="badge">'+n.cat+' T'+n.tier+'</span><br><span class="cost">'+n.cost+'</span><p class="desc">'+n.desc+'</p>';
  if(n.gap&&n.gapItems&&n.gapItems.length){
    h+='<div class="sh">What to order</div><div>';
    n.gapItems.forEach(function(g){h+='<span class="gc">'+g+'</span>';});
    h+='</div>';
  }
  if(n.techs&&n.techs.length){
    h+='<div class="sh">Key techniques</div><div>';
    n.techs.forEach(function(t){h+='<span class="tc">'+t+'</span>';});
    h+='</div>';
  }
  var pres=(n.pre||[]).map(function(p){return NM[p];}).filter(Boolean);
  if(pres.length){
    h+='<div class="sh">Prerequisites</div><div>';
    pres.forEach(function(p){h+='<span class="pc" onclick="openN(\''+p.id+'\')">'+p.label+'</span>';});
    h+='</div>';
  }
  var unlocks=nodes.filter(function(nd){return(nd.pre||[]).includes(id);});
  if(unlocks.length){
    h+='<div class="sh">Unlocks</div><div>';
    unlocks.forEach(function(u){h+='<span class="pc" onclick="openN(\''+u.id+'\')">'+u.label+'</span>';});
    h+='</div>';
  }
  if(n.cmp&&n.cmp.length){
    h+='<div class="sh">Market comparison</div>';
    n.cmp.forEach(function(c){h+='<div class="cm">'+c+'</div>';});
  }
  document.getElementById('pc').innerHTML=h;
  document.getElementById('panel').classList.add('open');
  render();
}

function render(){
  var svg=document.getElementById('tree');
  var maxT=Math.max.apply(null,nodes.map(function(n){return n.tier;}));
  var H=TOP+maxT*TH+NH+50;
  var W=980;
  svg.setAttribute('viewBox','0 0 '+W+' '+H);
  svg.setAttribute('height',H);
  var vis=aF==='all'?nodes:nodes.filter(function(n){return n.cat===aF||n.cat==='anchor'||(aF==='scope'&&n.cat==='pi3');});
  var vids=new Set(vis.map(function(n){return n.id;}));
  var o='<defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>';
  var colDefs=[{cat:'scope',label:'Oscilloscope'},{cat:'wfgen',label:'Waveform Gen'},{cat:'mm',label:'Multimeter'},{cat:'psu',label:'Power Supply'},{cat:'synth',label:'Synth Modules'},{cat:'pi3',label:'Pi 3 Branch'}];
  colDefs.forEach(function(cd){
    if(aF!=='all'&&aF!==cd.cat&&!(aF==='scope'&&cd.cat==='pi3'))return;
    var cc=CC[cd.cat];
    o+='<text x="'+(CX[cd.cat]+NW/2)+'" y="20" text-anchor="middle" font-size="10" font-weight="600" fill="'+cc.s+'">'+cd.label+'</text>';
  });
  var tiers=[...new Set(nodes.filter(function(n){return n.cat!=='anchor';}).map(function(n){return n.tier;}))].sort(function(a,b){return a-b;});
  tiers.forEach(function(t){
    o+='<text x="6" y="'+(ny(t)+NH/2+4)+'" font-size="8" fill="#ccc">T'+t+'</text>';
  });
  nodes.forEach(function(n){
    if(!vids.has(n.id))return;
    (n.pre||[]).forEach(function(pid){
      var pn=NM[pid];
      if(!pn||!vids.has(pid)||pn.cat!==n.cat)return;
      var pp=npos(pid),np=npos(n.id);
      var cc=CC[n.cat]||CC.scope;
      o+='<line x1="'+(pp.x+NW/2)+'" y1="'+(pp.y+NH)+'" x2="'+(np.x+NW/2)+'" y2="'+np.y+'" stroke="'+cc.s+'" stroke-width="1" opacity=".28" marker-end="url(#ar)"/>';
    });
  });
  if(aF==='all'||aF==='scope'){
    crossEdges.forEach(function(e){
      if(!vids.has(e.f)||!vids.has(e.t))return;
      var fn=NM[e.f],tn=NM[e.t];
      if(fn.cat===tn.cat)return;
      var fp=npos(e.f),tp=npos(e.t);
      var x1=fp.x+(fp.x<tp.x?NW:0),y1=fp.y+NH/2;
      var x2=tp.x+(fp.x<tp.x?0:NW),y2=tp.y+NH/2;
      var mx=(x1+x2)/2;
      o+='<path d="M'+x1+' '+y1+' C'+mx+' '+y1+' '+mx+' '+y2+' '+x2+' '+y2+'" fill="none" stroke="#bbb" stroke-width="0.65" stroke-dasharray="3 3" opacity=".4" marker-end="url(#ar)"/>';
    });
    nodes.forEach(function(n){
      if(!vids.has(n.id))return;
      (n.pre||[]).forEach(function(pid){
        var pn=NM[pid];
        if(!pn||!pn.anchor||!vids.has(pid))return;
        var pp=npos(pid),np=npos(n.id);
        var x1=pp.x+NW/2,y1=pp.y+NH,x2=np.x+NW/2,y2=np.y;
        var mx=(x1+x2)/2,my=(y1+y2)/2;
        o+='<path d="M'+x1+' '+y1+' C'+x1+' '+my+' '+x2+' '+my+' '+x2+' '+y2+'" fill="none" stroke="#E8940A" stroke-width="1" stroke-dasharray="4 2" opacity=".5" marker-end="url(#ar)"/>';
      });
    });
  }
  vis.forEach(function(n){
    var pos=npos(n.id);
    var cc=n.anchor?CC.anchor:n.gap?CC.gap:(CC[n.cat]||CC.scope);
    var isSel=sel===n.id;
    var faded=sel&&!isSel&&!((NM[sel]&&(NM[sel].pre||[]).includes(n.id)))&&!((n.pre||[]).includes(sel));
    o+='<g class="nd" onclick="openN(\''+n.id+'\')" style="opacity:'+(faded?0.13:1)+'">';
    if(n.anchor){
      o+='<rect x="'+pos.x+'" y="'+pos.y+'" width="'+NW+'" height="'+NH+'" rx="5" fill="'+cc.f+'" stroke="'+cc.s+'" stroke-width="2"/>';
      o+='<rect x="'+(pos.x+3)+'" y="'+(pos.y+3)+'" width="'+(NW-6)+'" height="'+(NH-6)+'" rx="3" fill="none" stroke="'+cc.s+'" stroke-width="0.7" stroke-dasharray="4 2" opacity=".5"/>';
    }else if(n.gap){
      o+='<rect x="'+pos.x+'" y="'+pos.y+'" width="'+NW+'" height="'+NH+'" rx="5" fill="'+cc.f+'" stroke="'+cc.s+'" stroke-width="'+(isSel?2.5:1.2)+'" stroke-dasharray="5 2"/>';
    }else{
      o+='<rect x="'+pos.x+'" y="'+pos.y+'" width="'+NW+'" height="'+NH+'" rx="5" fill="'+cc.f+'" stroke="'+cc.s+'" stroke-width="'+(isSel?2.5:0.8)+'"/>';
    }
    var tx=pos.x+NW/2;
    o+='<text x="'+tx+'" y="'+(pos.y+17)+'" text-anchor="middle" font-size="11" font-weight="600" fill="'+cc.t+'">'+n.label+'</text>';
    o+='<text x="'+tx+'" y="'+(pos.y+30)+'" text-anchor="middle" font-size="10" fill="'+cc.s+'" opacity=".8">'+n.sub+'</text>';
    o+='<text x="'+tx+'" y="'+(pos.y+43)+'" text-anchor="middle" font-size="9" fill="'+cc.s+'" opacity=".6">'+n.cost+'</text>';
    o+='</g>';
  });
  svg.innerHTML=o;
}
render();
</script>
</body>
</html>
